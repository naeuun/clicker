{% load static %}

<!doctype html>
<html>
<head>

<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="{% static 'clicker/css/style.css' %}">

</head>

<body>

<div class="wrapper">

<h2 class="title">
🏆 전체 랭킹
</h2>


<div class="card">
{% for user in users %}

<div class="rank-item">

<div class="rank-left 
{% if forloop.counter <= 3 %}
top-rank
{% endif %}
">

{% if forloop.counter == 1 %}
🥇
{% elif forloop.counter == 2 %}
🥈
{% elif forloop.counter == 3 %}
🥉
{% else %}
{{ forloop.counter }}위
{% endif %}

{{ user.name }}

</div>

<div class="rank-right">
🔥 {{ user.count }}
</div>

</div>

{% endfor %}
</div>


<div class="bottom-btns">

<a href="/" class="sub-btn">
← 첫 화면
</a>

<a href="/clicker/" class="main-btn">
클리커 이동
</a>

</div>


</div>

</body>
</html>
