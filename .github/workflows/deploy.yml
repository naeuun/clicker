name: Deploy to EC2

on:
  push:
    branches: ["main"]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Deploy via SSH (git pull + migrate + collectstatic)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            set -e

            cd /home/ubuntu/clicker
            git fetch --all
            git reset --hard origin/main

            cd /home/ubuntu/clicker/clicker_prj
            source .venv/bin/activate
            pip install -r requirements.txt

            python manage.py migrate --noinput
            python manage.py collectstatic --noinput

            sudo rsync -a --delete /home/ubuntu/clicker/clicker_prj/static/ /var/www/clicker/static/
            sudo systemctl restart clicker
            sudo systemctl reload nginx